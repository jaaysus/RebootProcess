<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EPN Photo Upload</title>
</head>
<body>
  <h2>EPN Photo Upload</h2>

  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>
  <br><br>
  <div id="preview"></div>
  <br>
  <button onclick="upload()">Upload</button>
  <br><br>

  <div id="status"></div>
  <br>

  <h3>Uploaded Photos</h3>
  <div id="cards"></div>

  <script>
    const BASE = 'http://localhost:5148';
    const dimensions = [];

    document.getElementById('fileInput').addEventListener('change', function () {
      document.getElementById('preview').innerHTML = '';
      dimensions.length = 0;

      const files = this.files;
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = function () {
          dimensions[i] = { width: img.naturalWidth, height: img.naturalHeight };
          URL.revokeObjectURL(url);
          const info = document.createElement('div');
          info.textContent = `${file.name} — ${img.naturalWidth}×${img.naturalHeight}`;
          document.getElementById('preview').appendChild(info);
        };
        img.src = url;
      }
    });

    async function upload() {
      const files = document.getElementById('fileInput').files;
      if (!files.length) { status('Select at least one file.'); return; }
      if (dimensions.filter(Boolean).length !== files.length) {
        status('Images still loading, try again.');
        return;
      }

      const fd = new FormData();
      for (let i = 0; i < files.length; i++) {
        fd.append('files', files[i]);
        fd.append('widths', dimensions[i].width);
        fd.append('heights', dimensions[i].height);
      }

      status(`Uploading ${files.length} file(s)...`);

      try {
        const res = await fetch(`${BASE}/api/EpnPhoto/upload-bulk`, {
          method: 'POST',
          body: fd,
          credentials: 'include'
        });
        const data = await res.json();

        if (data.failed?.length)
          status(`Done. ${data.succeeded?.length ?? 0} succeeded, ${data.failed.length} failed.`);
        else
          status(`Done. ${data.succeeded?.length ?? 0} uploaded.`);

        loadCards();
      } catch (err) {
        status('Error: ' + err.message);
      }
    }

    async function loadCards() {
      try {
        const res = await fetch(`${BASE}/api/EpnPhoto`, { credentials: 'include' });
        const photos = await res.json();
        const container = document.getElementById('cards');
        container.innerHTML = '';

        for (const p of photos) {
          const card = document.createElement('div');
          card.style.cssText = 'display:inline-block;border:1px solid #ccc;padding:8px;margin:8px;vertical-align:top;text-align:center;';

          const img = document.createElement('img');
          img.src = `${BASE}${p.filePath}`;
          img.style.cssText = 'display:block;width:120px;height:80px;object-fit:contain;';

          const name = document.createElement('div');
          name.textContent = p.filePath.split('/').pop();

          const dims = document.createElement('div');
          dims.style.color = '#666';
          dims.textContent = `${p.photoWidth} × ${p.photoHeight}`;

          card.appendChild(img);
          card.appendChild(name);
          card.appendChild(dims);
          container.appendChild(card);
        }
      } catch (err) {
        status('Failed to load photos: ' + err.message);
      }
    }

    function status(msg) {
      document.getElementById('status').textContent = msg;
    }

    // Load existing photos on page open
    loadCards();
  </script>
</body>
</html>
